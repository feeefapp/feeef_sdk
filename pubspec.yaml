name: feeef
description: Feeef SDK - API client, repositories, and integrations for Feeef apps.
version: 1.0.0
# publish_to: 'none'  # Uncomment to prevent publishing; remove to publish to pub.dev
# homepage: https://github.com/your-org/feeef
# repository: https://github.com/your-org/feeef
# issue_tracker: https://github.com/your-org/feeef/issues

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  cuid2:
    git:
      url: https://github.com/mohamadlounnas/cuid2
      ref: master
  diacritic: ^0.1.6
  dio: ^5.9.0
  firebase_core: ^3.14.0
  firebase_messaging: ^15.2.7
  file_picker: ^10.3.3
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  http_parser: ^4.0.2
  json_annotation: ^4.9.0
  path: ^1.9.0
  petitparser: ^7.0.0
  phosphor_flutter: ^2.1.0
  recase: ^4.1.0
  shared_preferences: ^2.5.3
  transmit_client: ^1.2.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  lints: ^6.0.0
  test: ^1.25.6
